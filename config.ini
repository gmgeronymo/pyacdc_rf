[Instruments]
;modelos de voltimetro para leitura do padrao e objeto
;opcoes testadas: 2182A, 182A
;para outros modelos, o programa tenta comando READ? / FETCH?
std = 2182A
dut = 2182A

[Sources]
;modo das fontes:
;shared   = uma unica fonte com dois canais (ex.: 33600A, CH1=AC e CH2=RF)
;separate = fontes independentes para AC e RF (ex.: 5700A para AC + 33600A para RF)
mode = shared
;modelos das fontes
;opcoes suportadas atualmente: 33600A (AC/RF), 5700A (AC)
ac_source = 33600A
rf_source = 33600A

[GPIB]
;endereco GPIB da fonte AC
ac_source = 5
;endereco GPIB da fonte RF (usado em mode = separate)
rf_source = 5
;endereco dos dvms
std = 7
dut = 23
;endereco da chave automatizada
sw = 10

[Measurement Config]
; resistencia do dut e do std
; necessario para configurar a fonte
r_dut = 4000 
r_std = 1000
;tempo de espera
wait_time = 60
;tempo de aquecimento (em segundos)
aquecimento = 60
;aquecimento = 36000
;quantidade de repeticoes
repeticoes = 12 
;tensao
;voltage = 0.8
voltage = 5
;frequencia (MHz)
frequency = 1, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50
;frequency = 1
;ciclo de medicao: RF-AC-RF-AC-RF (padrao) ou AC-RF-AC
measurement_cycle = RF-AC-RF-AC-RF
;criterio de exclusao para |Delta| (ppm)
delta_max_ppm = 150

[Misc]
;incluir as observacoes pertinentes (opcional)
observacoes = teste A55-5V X A55-20V @ 5 V.
;habilita leitura de temperatura/umidade/pressao via BME280
;true = habilita | false = desabilita
use_bme280 = false

[TVC]
;dados do TVC de referencia (STD)
std_model =
std_serial =
;dados do TVC sob calibracao (DUT)
dut_model =
dut_serial =

[Security]
;token simples para autenticacao REST (vazio = sem autenticacao)
token =
